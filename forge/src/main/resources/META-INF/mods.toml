    mandatory=true
    versionRange="[${forge_version},65)"
    ordering="NONE"
    side="BOTH"

[[dependencies.steady_xp]]
    modId="minecraft"
    mandatory=true
    versionRange="[${minecraft_version},26.2)"
    ordering="NONE"
    side="BOTH"
