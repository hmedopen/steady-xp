modLoader="javafml"
loaderVersion="[64,)"
license="MIT"
issueTrackerURL="https://github.com/hmedopen/steady-xp/issues"

[[mods]]
modId="steady_xp"
version="${mod_version}"
displayName="Steady XP"
displayURL="https://github.com/hmedopen/steady-xp"
logoFile="icon.png"
authors="hmed"
description='''Makes every Minecraft level cost the same configurable amount of XP.
XP is retained on death while inventory still drops normally.'''

[[dependencies.steady_xp]]
