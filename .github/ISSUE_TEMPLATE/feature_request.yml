name: Feature request
description: Suggest a focused improvement for Steady XP
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: request
    attributes:
      label: What would you like to change?
    validations:
      required: true
  - type: dropdown
    id: loaders
    attributes:
      label: Relevant loader
      options: [All loaders, Fabric, NeoForge, Forge]
    validations:
      required: true
